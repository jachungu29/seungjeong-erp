<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>승정 ERP · 통합 설계 (메뉴+연계)</title>
<style>
:root{--bg:#f4f6fb;--side:#0f1b2d;--side2:#16273f;--sidetx:#cdd9ec;--sidedim:#7e93b4;--card:#fff;--line:#e2e8f2;--tx:#1c2942;--dim:#64748b;--accent:#2563eb;--accent2:#1d4ed8;--flow:#2563eb;--auto:#16a34a;--block:#dc2626;--base:#64748b;--real:#16a34a;--plan:#d97706;--mono:"JetBrains Mono",Consolas,monospace;--kr:Pretendard,"Malgun Gothic",sans-serif}
*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:var(--bg);color:var(--tx);font-family:var(--kr);font-size:14px}
#app{display:flex;flex-direction:column;height:100vh}
.top{display:flex;align-items:center;gap:14px;background:var(--card);border-bottom:1px solid var(--line);padding:0 16px;height:54px;flex:0 0 54px}
.brand{font-weight:800;font-size:17px;color:var(--accent2);white-space:nowrap}
.brand span{font-size:11px;color:var(--dim);font-family:var(--mono);font-weight:600;margin-left:4px}
.crumb{color:var(--dim);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.crumb b{color:var(--tx)}
.actions{display:flex;align-items:center;gap:8px}
.actions input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-size:13px;width:150px;background:var(--bg)}
.tbtn{border:1px solid var(--line);background:var(--bg);color:var(--tx);border-radius:8px;padding:7px 11px;font:inherit;font-size:12.5px;cursor:pointer;white-space:nowrap}
.tbtn:hover{border-color:var(--accent)}.tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.body{display:flex;flex:1;min-height:0}
.side{width:285px;flex:0 0 285px;background:var(--side);color:var(--sidetx);overflow-y:auto;padding:8px 6px 40px}
.side::-webkit-scrollbar{width:8px}.side::-webkit-scrollbar-thumb{background:#2a3c58;border-radius:8px}
.nrow{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;cursor:pointer;min-height:32px}
.nrow:hover{background:var(--side2)}.nrow.sel{background:var(--accent);color:#fff}
.nrow.sel .ncode{color:#dbe8ff}
.tw{width:14px;flex:0 0 14px;text-align:center;color:var(--sidedim);font-size:10px}
.dotc{width:9px;height:9px;border-radius:3px;flex:0 0 9px}
.ncode{font-family:var(--mono);font-size:10px;color:var(--sidedim);flex:0 0 auto}
.nko{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;overflow-y:auto;padding:22px 26px 60px}
.scr-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.bigcode{font-family:var(--mono);font-weight:800;font-size:13px;color:#fff;border-radius:7px;padding:4px 9px}
.scr-t{font-size:23px;font-weight:800}
.path{color:var(--dim);font-size:12.5px;margin-bottom:18px}
.sec-t{font-size:15px;font-weight:800;margin:20px 0 8px;display:flex;align-items:center;gap:7px}
.sec-t i{width:4px;height:15px;background:var(--accent);border-radius:2px;display:inline-block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;max-width:980px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;transition:.12s}
.tile:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(37,99,235,.08)}
.tile .tc{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:700}
.tile .tk{font-size:14px;font-weight:700;margin-top:3px}.tile .ts{font-size:11.5px;color:var(--dim);margin-top:3px}
.lk{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin:6px 0;max-width:980px;cursor:pointer}
.lk:hover{border-color:var(--accent)}
.lkdir{font-family:var(--mono);font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;flex:0 0 auto}
.din{background:#e0f2fe;color:#0369a1}.dout{background:#dcfce7;color:#15803d}
.mtag{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;border-radius:5px;padding:1px 7px;white-space:nowrap;flex:0 0 auto}
.lktxt{flex:1;font-size:13px}
.kind{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex:0 0 auto}
.k-flow{background:#dbeafe;color:#1d4ed8}.k-auto{background:#dcfce7;color:#15803d}.k-block{background:#fee2e2;color:#b91c1c}.k-base{background:#e2e8f0;color:#475569}
.vf{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;flex:0 0 auto}
.v-real{background:#dcfce7;color:#15803d}.v-plan{background:#fef3c7;color:#b45309}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:110px}
.kpi b{display:block;font-size:24px;color:var(--accent2);font-weight:800}.kpi span{font-size:12px;color:var(--dim)}
.tip{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:10px;padding:11px 14px;font-size:12.5px;max-width:980px;margin:12px 0}
.diagwrap{display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;margin-top:10px}
.diagwrap.on{display:block}
.diagwrap svg{width:100%;height:auto}
.muted{color:var(--dim);font-size:12.5px;line-height:1.7;max-width:980px}
.bomscroll{overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--card);max-height:72vh}
.bomtbl{border-collapse:collapse;width:100%;font-size:11.5px;white-space:nowrap}
.bomtbl thead th{position:sticky;top:0;background:#0f2747;color:#fff;font-weight:700;padding:6px 8px;border:1px solid #20406a;font-size:11px;text-align:center;z-index:2}
.bomtbl td{border:1px solid var(--line);padding:4px 8px}
.bomtbl tbody tr:hover td{background:#eef4ff}
.bomtbl .bl0 td{background:#fde9d0;font-weight:800}
.bomtbl .bl1 td{background:#fff7ec}
.bomtbl .nm{font-weight:600}
.bomtbl .pno{font-family:var(--mono);color:#1d4ed8}
.bomtbl .mat{color:#7c3aed}
.bomtbl .num{text-align:right;font-family:var(--mono)}
.bomtbl .ctr{text-align:center}
.lvt{font-family:var(--mono);font-size:10px;color:#fff;background:#94a3b8;border-radius:4px;padding:0 5px}
.lvt.l0{background:#B45309}.lvt.l1{background:#0e7490}.lvt.l2{background:#475569}
.bomtbl .bnew td{background:#f0fdf4}
.bnewbadge{font-family:var(--mono);font-size:9.5px;font-weight:700;color:#15803d;background:#dcfce7;border:1px solid #bbf7d0;border-radius:4px;padding:0 5px;margin-left:6px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:6px 2px 4px;font-size:11.5px}
.lg{display:flex;align-items:center;gap:5px;color:var(--dim)}.lg i{width:18px;height:0;border-top:3px solid;display:inline-block}.lg i.dash{border-top-style:dashed}
</style></head><body>
<div id="app">
 <header class="top">
  <div class="brand">승정 ERP <span>통합설계 v1</span></div>
  <div class="crumb" id="crumb"></div>
  <div class="actions">
   <input id="search" placeholder="메뉴 검색…" oninput="onSearch(this.value)">

  </div>
 </header>
 <div class="body">
  <nav class="side" id="side"></nav>
  <main class="main" id="main"></main>
 </div>
</div>

 if(n.id==='bomlist'){renderBOM(n.code,r.path);return;}
 var h='<div class="scr-h"><span class="bigcode" style="background:'+rootColor+'">'+n.code+'</span><span class="scr-t">'+esc(n.ko)+'</span></div>';
 h+='<div class="path">'+pathStr(r.path)+'</div>';
 if(has){
  h+='<div class="sec-t"><i></i>하위 메뉴 ('+n.ch.length+')</div><div class="grid">';
  n.ch.forEach(function(c){var sub=(c.ch&&c.ch.length)?(c.ch.length+"개 하위"):"화면";h+='<div class="tile" onclick="goNode(\''+c.id+'\')"><div class="tc">'+c.code+'</div><div class="tk">'+esc(c.ko)+'</div><div class="ts">'+sub+'</div></div>';});
  h+='</div>';
 } else {
  h+='<div class="tip">말단 화면입니다. 실제 입력·저장 기능은 Supabase 연동(2단계) 때 채워집니다.</div>';
 }
 var lf=linksFor(rootCode);
 if(lf.ins.length||lf.outs.length){
  h+='<div class="sec-t"><i></i>이 모듈('+rootCode+' '+esc(r.path[0].ko)+')의 연계 '+(lf.ins.length+lf.outs.length)+'건</div>';
  lf.outs.forEach(function(l){h+=lkRow(l,"out");});
  lf.ins.forEach(function(l){h+=lkRow(l,"in");});
 } else {
  h+='<div class="sec-t"><i></i>연계</div><div class="muted">등록된 연계가 없습니다.</div>';
 }
 m.innerHTML=h;
}
function renderHome(){
 var m=document.getElementById("main");document.getElementById("crumb").innerHTML="<b>홈</b> 통합 설계 개요";
 var leaf=0,tot=0;(function w(a){a.forEach(function(n){tot++;if(!(n.ch&&n.ch.length))leaf++;w(n.ch||[]);});})(TREE);
 var nreal=LINKS.filter(function(l){return l[4]!=="plan";}).length;
 var h='<div class="scr-h"><span class="scr-t">통합 설계 개요</span></div><div class="path">메뉴 구조 + 모듈 연계를 한 화면에서 · REV25 기준 · v378 실측 반영</div>';
 h+='<div class="kpis"><div class="kpi"><b>'+TREE.length+'</b><span>대분류</span></div><div class="kpi"><b>'+leaf+'</b><span>화면(말단)</span></div><div class="kpi"><b>'+tot+'</b><span>전체 항목</span></div><div class="kpi"><b>'+LINKS.length+'</b><span>연계</span></div><div class="kpi"><b>'+nreal+'</b><span>실제 구현</span></div></div>';
 h+='<div class="tip"><b>사용법</b> · 좌측 메뉴를 누르면 그 모듈의 <b>하위 화면</b>과 <b>연계</b>가 함께 보입니다. 연계 줄을 클릭하면 연결된 모듈로 이동합니다. 상단 <b>전체 연계도</b>로 흐름도 전체를 봅니다.</div>';
 h+='<div class="sec-t"><i></i>대분류 바로가기</div><div class="grid">';
 TREE.forEach(function(n){var sub=(n.ch&&n.ch.length)?(n.ch.length+"개 하위"):"화면";h+='<div class="tile" onclick="goNode(\''+n.id+'\')"><div class="tc" style="color:'+(n.color||"#2563eb")+'">'+n.code+'</div><div class="tk">'+esc(n.ko)+'</div><div class="ts">'+sub+'</div></div>';});
 h+='</div>';
 m.innerHTML=h;
}

/* ===== BOM LIST (엑셀 반영) ===== */
var BOMHEAD=["Lv","Part Name","Part Number","Specifications","Materials","단가","단위","소요량","제품중량[g]","런너중량[g]","총중량","C/T","CVT","UPH","금형번호","설비명","공급처","Remark","설비코드"];
var bomMax=9, bomQ="";
function renderBOM(code,path){
 var m=document.getElementById("main");
 var h='<div class="scr-h"><span class="bigcode" style="background:#B45309">'+code+'</span><span class="scr-t">BOM LIST (종합)</span><span style="font-family:monospace;color:#64748b">2026. 06. 23</span></div>';
 h+='<div class="path">'+pathStr(path)+' · 엑셀 원본 그대로 반영 (278 품목)</div>';
 h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">'
  +'<input id="bq" placeholder="품명·품번·재질 검색…" style="border:1px solid var(--line);border-radius:8px;padding:7px 11px;font:inherit;width:230px" oninput="bomFilter(this.value)">'
  +'<button class="tbtn" onclick="bomLv(0)">완제품만(Lv0)</button><button class="tbtn" onclick="bomLv(9)">전체 펼치기</button>'
  +'<button class="tbtn" onclick="bomCSV()">CSV 내보내기</button><span class="muted" id="bkpi"></span></div>';
 h+='<div class="tip">신규 BOM <b>등록·수정·삭제</b>는 전용 화면 <b>BOM LIST(승정ERP_BOM_LIST.html)</b>에서 합니다. 여기에는 저장된 신규 항목이 <span class="bnewbadge">신규</span>로 함께 표시됩니다.</div>';
 h+='<div class="bomscroll"><table class="bomtbl" id="bomtbl"></table></div>';
 m.innerHTML=h;bomDraw();
}
function bomDraw(){
 var q=bomQ.toLowerCase();
 var h="<thead><tr>";BOMHEAD.forEach(function(x){h+="<th>"+esc(x)+"</th>";});h+="</tr></thead><tbody>";
 var shown=0;
 var U=[];try{U=JSON.parse(localStorage.getItem("SJ_BOM_USER")||"[]");}catch(e){}
 BOM.concat(U.map(function(x){var c={};for(var k in x)c[k]=x[k];c._new=true;return c;})).forEach(function(r){
  if(r.lv>bomMax)return;
  if(q){var hay=(r.name+" "+r.pno+" "+r.mat+" "+r.spec).toLowerCase();if(hay.indexOf(q)<0)return;}
  shown++;var cl=r.lv<=2?r.lv:2;
  h+='<tr class="bl'+cl+(r._new?" bnew":"")+'"><td class="ctr"><span class="lvt l'+cl+'">'+r.lv+'</span></td>';
  h+='<td class="nm" style="padding-left:'+(8+r.lv*15)+'px">'+(r.lv===0?"● ":(r.lv===1?"▸ ":"· "))+esc(r.name)+(r._new?' <span class="bnewbadge">신규</span>':'')+'</td>';
  h+='<td class="pno">'+esc(r.pno)+'</td><td>'+esc(r.spec)+'</td><td class="mat">'+esc(r.mat)+'</td>';
  ["price","unit","qty","wp","wr","wt","ct","cvt","uph"].forEach(function(k){h+='<td class="'+(k==="unit"?"ctr":"num")+'">'+esc(r[k])+'</td>';});
  ["mold","eqp","sup","remark","eqpcode"].forEach(function(k){h+='<td>'+esc(r[k])+'</td>';});
  h+='</tr>';
 });
 h+="</tbody>";document.getElementById("bomtbl").innerHTML=h;
 document.getElementById("bkpi").textContent=shown+" / "+BOM.length+" 품목";
}
function bomFilter(v){bomQ=(v||"").trim();bomDraw();}
function bomLv(v){bomMax=v;bomDraw();}
function bomCSV(){var K=["lv","name","pno","spec","mat","price","unit","qty","wp","wr","wt","ct","cvt","uph","mold","eqp","sup","remark","eqpcode"];
 var lines=[BOMHEAD.join(",")];BOM.forEach(function(r){if(r.lv>bomMax)return;lines.push(K.map(function(k){var s=String(r[k]==null?"":r[k]);if(/[",\n]/.test(s))s='"'+s.replace(/"/g,'""')+'"';return s;}).join(","));});
 var b=new Blob(["﻿"+lines.join("\n")],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="승정_BOM_LIST.csv";a.click();}

/* ===== 전체 연계도 ===== */
var W=150,H=50,VW=1200,VH=700,DIAG=false;
function ctr(o){return[o.x+W/2,o.y+H/2];}
function edge(o,tx,ty){var cx=o.x+W/2,cy=o.y+H/2,dx=tx-cx,dy=ty-cy;if(!dx&&!dy)return[cx,cy];var sx=dx?(W/2)/Math.abs(dx):1e9,sy=dy?(H/2)/Math.abs(dy):1e9,t=Math.min(sx,sy);return[cx+dx*t,cy+dy*t];}
function svgHTML(){
 var defs="";Object.keys(KIND).forEach(function(k){defs+='<marker id="ik_'+k+'" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="'+KIND[k]+'"/></marker>';});
 var arr="";LINKS.forEach(function(l){var a=M[l[0]],b=M[l[1]];if(!a||!b)return;var ca=ctr(a),cb=ctr(b),p1=edge(a,cb[0],cb[1]),p2=edge(b,ca[0],ca[1]);var plan=(l[4]==="plan");var col=KIND[l[2]]||"#64748b";arr+='<line x1="'+p1[0].toFixed(1)+'" y1="'+p1[1].toFixed(1)+'" x2="'+p2[0].toFixed(1)+'" y2="'+p2[1].toFixed(1)+'" stroke="'+col+'" stroke-width="1.7"'+(plan?' stroke-dasharray="6 5"':'')+' opacity="'+(plan?0.3:0.55)+'" marker-end="url(#ik_'+l[2]+')"><title>'+esc(l[3])+'</title></line>';});
 var boxes="";MODS.forEach(function(m){var o=M[m[0]];var pb=o.plan?' stroke="#fff" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.92"':'';boxes+='<g><rect x="'+o.x+'" y="'+o.y+'" width="'+W+'" height="'+H+'" rx="10" fill="'+o.color+'"'+pb+'/><text x="'+(o.x+12)+'" y="'+(o.y+19)+'" font-size="10" fill="#fff" opacity="0.85" font-family="monospace">'+esc(o.code)+'</text>'+(o.plan?'<text x="'+(o.x+W-10)+'" y="'+(o.y+19)+'" font-size="9" fill="#fff" text-anchor="end" font-family="monospace">예정</text>':'')+'<text x="'+(o.x+W/2)+'" y="'+(o.y+36)+'" font-size="12.5" fill="#fff" text-anchor="middle" font-weight="700">'+esc(o.name)+'</text></g>';});
 return '<div class="legend"><span class="lg"><i style="border-color:#2563eb"></i>흐름</span><span class="lg"><i style="border-color:#16a34a"></i>자동</span><span class="lg"><i style="border-color:#dc2626"></i>차단</span><span class="lg"><i style="border-color:#64748b"></i>기준</span><span class="lg"><i style="border-color:#16a34a"></i>실선=실제(v378)</span><span class="lg"><i class="dash" style="border-color:#d97706"></i>점선=설계예정</span></div><svg viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg"><defs>'+defs+'</defs>'+arr+boxes+'</svg>';
}
function toggleDiag(){DIAG=!DIAG;document.getElementById("diagBtn").classList.toggle("on",DIAG);if(DIAG){SEL=null;document.getElementById("crumb").innerHTML="<b>전체 연계도</b>";document.getElementById("main").innerHTML='<div class="scr-h"><span class="scr-t">전체 연계도</span></div><div class="path">19개 모듈 · '+LINKS.length+'개 연계 (실선=실제 구현, 점선=설계 예정)</div><div class="diagwrap on">'+svgHTML()+'</div>';renderNav();}else{renderHome();renderNav();}}
function onSearch(v){QUERY=(v||"").trim().toLowerCase();renderNav();}

renderNav();renderHome();
</script></body></html>
