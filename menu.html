<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>승정 ERP · 설계기준 v1</title>
<style>
:root{--bg:#f4f6fb;--side:#0f1b2d;--side2:#16273f;--sidetx:#cdd9ec;--sidedim:#7e93b4;--card:#ffffff;--line:#e2e8f2;--tx:#1c2942;--dim:#64748b;--accent:#2563eb;--accent2:#1d4ed8;--ok:#16a34a;--warn:#d97706;--mono:"JetBrains Mono",Consolas,monospace;--kr:Pretendard,"Malgun Gothic",sans-serif}
*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:var(--bg);color:var(--tx);font-family:var(--kr);font-size:14px}
#app{display:flex;flex-direction:column;height:100vh}
.top{display:flex;align-items:center;gap:14px;background:var(--card);border-bottom:1px solid var(--line);padding:0 16px;height:54px;flex:0 0 54px}
.brand{font-weight:800;font-size:17px;color:var(--accent2);white-space:nowrap}
.brand span{font-size:11px;color:var(--dim);font-family:var(--mono);font-weight:600;margin-left:4px}
.crumb{color:var(--dim);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.crumb b{color:var(--tx)}
.actions{display:flex;align-items:center;gap:8px}
.actions input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-size:13px;width:150px;background:var(--bg)}
.tbtn{border:1px solid var(--line);background:var(--bg);color:var(--tx);border-radius:8px;padding:7px 11px;font:inherit;font-size:12.5px;cursor:pointer;white-space:nowrap}
.tbtn:hover{border-color:var(--accent)}
.tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.save{font-size:11.5px;color:var(--ok);font-family:var(--mono);white-space:nowrap}
.body{display:flex;flex:1;min-height:0}
.side{width:290px;flex:0 0 290px;background:var(--side);color:var(--sidetx);overflow-y:auto;padding:8px 6px 40px}
.side::-webkit-scrollbar{width:8px}.side::-webkit-scrollbar-thumb{background:#2a3c58;border-radius:8px}
.addroot{display:none;width:calc(100% - 8px);margin:4px;padding:8px;border:1px dashed #34527d;background:transparent;color:#8fb4ee;border-radius:8px;font:inherit;font-size:12.5px;cursor:pointer}
.addroot:hover{border-color:var(--accent);color:#bcd6ff}
.nrow{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;cursor:pointer;min-height:32px}
.nrow:hover{background:var(--side2)}
.nrow.sel{background:var(--accent);color:#fff}
.nrow.sel .ncode,.nrow.sel .nlv{color:#dbe8ff}
.tw{width:14px;flex:0 0 14px;text-align:center;color:var(--sidedim);font-size:10px}
.dotc{width:9px;height:9px;border-radius:3px;flex:0 0 9px}
.ncode{font-family:var(--mono);font-size:10px;color:var(--sidedim);flex:0 0 auto}
.nko{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nlv{font-family:var(--mono);font-size:8.5px;color:var(--sidedim);border:1px solid #2a3c58;border-radius:4px;padding:0 4px;flex:0 0 auto}
.nact{display:none;gap:2px;flex:0 0 auto}
.editing .nrow:hover .nact{display:flex}
.editing .nrow.sel .nact{display:flex}
.nact button{width:22px;height:22px;border:1px solid #2a3c58;background:#0c1626;color:#9fb3d4;border-radius:5px;cursor:pointer;font-size:11px;padding:0;line-height:1}
.nact button:hover{border-color:var(--accent);color:#fff}
.nact .d:hover{border-color:#ef4444;color:#ef4444}
.nact .a:hover{border-color:var(--ok);color:#4ade80}
.main{flex:1;overflow-y:auto;padding:22px 26px 60px}
.scr-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.bigcode{font-family:var(--mono);font-weight:800;font-size:13px;color:#fff;background:var(--accent);border-radius:7px;padding:4px 9px}
.scr-t{font-size:23px;font-weight:800}
.scr-en{font-family:var(--mono);font-size:13px;color:var(--dim)}
.path{color:var(--dim);font-size:12.5px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0;max-width:880px}
.card h3{margin:0 0 10px;font-size:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-width:920px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;transition:.12s}
.tile:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(37,99,235,.08)}
.tile .tc{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:700}
.tile .tk{font-size:14px;font-weight:700;margin-top:3px}
.tile .ts{font-size:11.5px;color:var(--dim);margin-top:3px}
textarea{width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font:inherit;font-size:13.5px;resize:vertical;background:#fcfdff}
.muted{color:var(--dim);font-size:12.5px;line-height:1.7}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:120px}
.kpi b{display:block;font-size:24px;color:var(--accent2);font-weight:800}
.kpi span{font-size:12px;color:var(--dim)}
.badge{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:5px;margin-left:6px}
.bn{background:#fef3e2;color:#b45309;border:1px solid #fcd9a8}
.bl{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}
.tip{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:10px;padding:11px 14px;font-size:12.5px;max-width:880px;margin:14px 0}
.hidefile{display:none}
</style></head><body>
<div id="app">
 <header class="top">
  <div class="brand">승정 ERP <span>설계기준 v1</span></div>
  <div class="crumb" id="crumb"></div>
  <div class="actions">
   <input id="search" placeholder="메뉴 검색…" oninput="onSearch(this.value)">
   <button class="tbtn" id="editBtn" onclick="toggleEdit()">설계 편집: 끔</button>
   <button class="tbtn" onclick="doExport()">내보내기</button>
   <button class="tbtn" onclick="document.getElementById('imp').click()">불러오기</button>
   <button class="tbtn" onclick="doReset()">초기화</button>
   <span class="save" id="save">저장됨</span>
   <input type="file" id="imp" class="hidefile" accept=".json" onchange="doImport(this)">
  </div>
 </header>
 <div class="body">
  <nav class="side" id="side"></nav>
  <main class="main" id="main"></main>
 </div>
</div>

 h+='<span class="ncode">'+n.code+'</span>';
 h+='<span class="nko">'+n.ko+'</span>';
 h+='<span class="nlv">'+lab+'</span>';
 h+='<span class="nact">'
   +'<button class="a" title="하위 추가" onclick="event.stopPropagation();addC(\''+n.id+'\')">＋</button>'
   +'<button title="이름 변경" onclick="event.stopPropagation();ren(\''+n.id+'\')">✎</button>'
   +'<button title="위로" onclick="event.stopPropagation();mov(\''+n.id+'\',-1)">▲</button>'
   +'<button title="아래로" onclick="event.stopPropagation();mov(\''+n.id+'\',1)">▼</button>'
   +'<button class="d" title="삭제" onclick="event.stopPropagation();del(\''+n.id+'\')">✕</button>'
   +'</span></div>';
 if(has&&open)n.ch.forEach(function(c){h+=row(c,depth+1);});
 return h;
}
function clickNode(id,has){
 if(has&&!EDIT){EXP[id]=!(EXP[id]===true);}
 if(has&&EDIT){EXP[id]=!(EXP[id]===true);}
 SEL=id;renderNav();renderMain();
}
function pathStr(path){return path.map(function(n){return n.code+" "+n.ko;}).join("  ›  ");}

function renderMain(){
 var m=document.getElementById("main");var cr=document.getElementById("crumb");
 if(!SEL){renderHome();return;}
 var r=findP(SEL);if(!r){SEL=null;renderHome();return;}
 var n=r.node;var has=n.ch&&n.ch.length;
 cr.innerHTML="<b>"+n.code+"</b> "+pathStr(r.path);
 var h='<div class="scr-h"><span class="bigcode">'+n.code+'</span><span class="scr-t">'+n.ko+'</span>'+(n.en?'<span class="scr-en">'+n.en+'</span>':'')+badges(n.flags)+'</div>';
 h+='<div class="path">'+pathStr(r.path)+'</div>';
 if(has){
   h+='<div class="grid">';
   n.ch.forEach(function(c){
     var sub=(c.ch&&c.ch.length)?(c.ch.length+"개 하위"):"화면";
     h+='<div class="tile" onclick="goNode(\''+c.id+'\')"><div class="tc">'+c.code+'</div><div class="tk">'+c.ko+'</div><div class="ts">'+sub+'</div></div>';
   });
   h+='</div>';
   h+='<div class="tip">이 항목은 <b>'+n.ch.length+'개의 하위</b>를 가진 구역입니다. 위 카드를 눌러 하위로 이동하세요. 구조를 바꾸려면 상단 <b>설계 편집</b>을 켜세요.</div>';
 } else {
   h+='<div class="card"><h3>화면 설계 메모</h3><div class="muted">이 화면(<b>'+n.code+' '+n.ko+'</b>)에 들어갈 항목·입력칸·규칙을 자유롭게 적어두세요. 실제 입력 화면은 이 메모를 바탕으로 단계별로 제작됩니다.</div>';
   h+='<textarea id="memo" placeholder="예) 필수 입력: 품번, 수량, LOT / 자동: 일시, 작업자 / 규칙: 검사 미합격 시 저장 차단 …" oninput="saveMemo(\''+n.id+'\',this.value)">'+(getMemo(n.id))+'</textarea></div>';
   h+='<div class="tip">실제 데이터 입력·저장 기능은 <b>Supabase 연동(2단계)</b> 이후 이 화면에 채워집니다. 지금은 설계를 확정하는 단계예요.</div>';
 }
 m.innerHTML=h;
}
function renderHome(){
 var m=document.getElementById("main");document.getElementById("crumb").innerHTML="<b>홈</b> 설계 개요";
 var c=[0,0,0],tot=0,leaf=0;
 (function w(a,d){a.forEach(function(n){tot++;if(d<3)c[d]++;if(!(n.ch&&n.ch.length))leaf++;w(n.ch||[],d+1);});})(TREE,0);
 var h='<div class="scr-h"><span class="scr-t">설계 개요</span></div>';
 h+='<div class="path">REV25 설계 기준 · 좌측 메뉴에서 항목을 선택하세요</div>';
 h+='<div class="kpis">';
 h+='<div class="kpi"><b>'+c[0]+'</b><span>대분류</span></div>';
 h+='<div class="kpi"><b>'+c[1]+'</b><span>중분류</span></div>';
 h+='<div class="kpi"><b>'+c[2]+'</b><span>소분류</span></div>';
 h+='<div class="kpi"><b>'+leaf+'</b><span>실제 화면(말단)</span></div>';
 h+='<div class="kpi"><b>'+tot+'</b><span>전체 항목</span></div>';
 h+='</div>';
 h+='<div class="grid">';
 TREE.forEach(function(n){var sub=(n.ch&&n.ch.length)?(n.ch.length+"개 하위"):"화면";h+='<div class="tile" onclick="goNode(\''+n.id+'\')"><div class="tc" style="color:'+(n.color||"#2563eb")+'">'+n.code+'</div><div class="tk">'+n.ko+'</div><div class="ts">'+sub+'</div></div>';});
 h+='</div>';
 h+='<div class="tip"><b>사용법</b> · 좌측에서 메뉴를 펼쳐 이동합니다. 구조(대분류·중분류·소분류)를 바꾸려면 상단 <b>설계 편집</b>을 켜고 각 항목의 ＋ ✎ ▲▼ ✕ 버튼을 쓰세요. 바꾼 내용은 자동 저장되고, <b>내보내기</b>로 JSON 백업도 됩니다.</div>';
 m.innerHTML=h;
}
function goNode(id){SEL=id;var r=findP(id);if(r){r.path.forEach(function(n){EXP[n.id]=true;});}renderNav();renderMain();}

function toggleEdit(){EDIT=!EDIT;document.getElementById("editBtn").textContent="설계 편집: "+(EDIT?"켬":"끔");document.getElementById("editBtn").classList.toggle("on",EDIT);document.getElementById("side").classList.toggle("editing",EDIT);var a=document.getElementById("addrootbtn");if(a)a.style.display=EDIT?"block":"none";}
function onSearch(v){QUERY=(v||"").trim().toLowerCase();renderNav();}

/* ===== 편집 ===== */
function addRoot(){var ko=prompt("새 대분류 이름:");if(!ko||!ko.trim())return;TREE.push({id:uid(),ko:ko.trim(),en:"",flags:"",color:"#5a6b78",ch:[]});save();renderNav();}
function addC(id){var r=findP(id);if(!r)return;var ko=prompt('"'+r.node.ko+'" 아래에 추가할 항목:');if(!ko||!ko.trim())return;r.node.ch=r.node.ch||[];r.node.ch.push({id:uid(),ko:ko.trim(),en:"",flags:"",ch:[]});EXP[id]=true;save();renderNav();if(SEL===id)renderMain();}
function ren(id){var r=findP(id);if(!r)return;var ko=prompt("이름 변경:",r.node.ko);if(ko===null||!ko.trim())return;r.node.ko=ko.trim();save();renderNav();if(SEL===id)renderMain();}
function mov(id,dir){var r=findP(id);if(!r)return;var j=r.i+dir;if(j<0||j>=r.arr.length)return;var t=r.arr[r.i];r.arr[r.i]=r.arr[j];r.arr[j]=t;save();renderNav();if(SEL)renderMain();}
function del(id){var r=findP(id);if(!r)return;var cnt=cntN(r.node);if(!confirm('"'+r.node.code+' '+r.node.ko+'"'+(cnt>1?(" 및 하위 "+(cnt-1)+"개"):"")+" 삭제할까요?"))return;r.arr.splice(r.i,1);if(SEL===id)SEL=null;save();renderNav();renderMain();}
function cntN(n){var c=1;(n.ch||[]).forEach(function(x){c+=cntN(x);});return c;}

/* ===== 메모 ===== */
function mkey(id){return"SJ_ERP_MEMO_"+id;}
function getMemo(id){return(localStorage.getItem(mkey(id))||"").replace(/</g,"&lt;");}
function saveMemo(id,v){localStorage.setItem(mkey(id),v);flash();}

/* ===== 가져오기/내보내기/초기화 ===== */
function doExport(){computeCodes();var b=new Blob([JSON.stringify(TREE,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="승정ERP_설계_"+new Date().toISOString().slice(0,10)+".json";a.click();}
function doImport(inp){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var t=JSON.parse(rd.result);if(Array.isArray(t)&&t.length){TREE=t;SEL=null;EXP={};save();renderNav();renderMain();alert("설계를 불러왔습니다.");}else alert("형식이 올바르지 않습니다.");}catch(e){alert("읽기 오류: "+e.message);}inp.value="";};rd.readAsText(f);}
function doReset(){if(!confirm("편집 내용을 모두 지우고 기본 설계(REV25)로 되돌릴까요? (메모는 유지)"))return;TREE=clone(SEED);SEL=null;EXP={};save();renderNav();renderMain();}

renderNav();renderMain();
</script></body></html>
