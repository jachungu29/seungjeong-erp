<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>승정 BOM LIST (종합)</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--line:#d8e0ec;--tx:#1c2942;--dim:#64748b;--accent:#2563eb;--head:#0f2747;--mono:"JetBrains Mono",Consolas,monospace;--kr:Pretendard,"Malgun Gothic",sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font-family:var(--kr);font-size:13px}
.wrap{max-width:none;margin:0;padding:10px 12px 22px}
.tt{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
h1{font-size:22px;font-weight:800;margin:0}
.date{color:var(--dim);font-family:var(--mono);font-size:13px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.bar input[type=text]{border:1px solid var(--line);border-radius:8px;padding:7px 11px;font:inherit;width:230px}
.btn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 12px;font:inherit;font-size:12.5px;cursor:pointer}
.btn:hover{border-color:var(--accent)}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.pri:hover{background:#1d4ed8}
.kpi{color:var(--dim);font-size:12px;font-family:var(--mono)}
.scroll{overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--card);max-height:calc(100vh - 112px)}
table{border-collapse:collapse;width:100%;font-size:12px;white-space:nowrap}
thead th{position:sticky;top:0;background:var(--head);color:#fff;font-weight:700;padding:7px 9px;border:1px solid #20406a;font-size:11.5px;text-align:center;z-index:2}
td{border:1px solid var(--line);padding:5px 9px;vertical-align:middle}
tbody tr:hover td{background:#eef4ff}
thead th:nth-child(1),tbody td:nth-child(1){position:sticky;left:0;width:40px;min-width:40px;max-width:40px;padding-left:4px;padding-right:4px;z-index:1}
thead th:nth-child(2),tbody td:nth-child(2){position:sticky;left:40px;min-width:240px;z-index:1}
thead th:nth-child(1),thead th:nth-child(2){z-index:4}
tbody td:nth-child(1),tbody td:nth-child(2){background:#fff}
.lv0 td:nth-child(1),.lv0 td:nth-child(2){background:#fde9d0}
.lv1 td:nth-child(1),.lv1 td:nth-child(2){background:#fff7ec}
.newrow td:nth-child(1),.newrow td:nth-child(2){background:#f0fdf4}
.lv0 td{background:#fde9d0;font-weight:800}
.lv1 td{background:#fff7ec}
.nm{font-weight:600}
.pno{font-family:var(--mono);font-size:11.5px;color:#1d4ed8}
.num{text-align:right;font-family:var(--mono)}
.ctr{text-align:center}
.mark{display:inline-block;width:18px;color:#B45309;font-weight:800;text-align:center}
.mat{color:#7c3aed}
.lvtag{font-family:var(--mono);font-size:10px;color:#fff;background:#94a3b8;border-radius:4px;padding:0 5px}
.lvtag.l0{background:#B45309}.lvtag.l1{background:#0e7490}.lvtag.l2{background:#475569}
.newbadge{font-family:var(--mono);font-size:9.5px;font-weight:700;color:#15803d;background:#dcfce7;border:1px solid #bbf7d0;border-radius:4px;padding:0 5px;margin-left:6px}
.editbadge{font-family:var(--mono);font-size:9.5px;font-weight:700;color:#b45309;background:#fef3c7;border:1px solid #fde68a;border-radius:4px;padding:0 5px;margin-left:6px}
.delbtn.ed{color:#2563eb}.delbtn.ed:hover{border-color:#2563eb;background:#eff6ff}
.ein{width:100%;min-width:72px;border:1px solid #c7d2e0;border-radius:5px;padding:3px 6px;font:inherit;font-size:11.5px;background:#fff}
.ein:focus{outline:2px solid #93c5fd;border-color:#2563eb}
.lvsel{font-weight:800;color:#fff;border:none;border-radius:5px;text-align:center;font-size:11px;padding:2px 0;background:#94a3b8;cursor:pointer}
.lvsel.l0{background:#B45309}.lvsel.l1{background:#0e7490}.lvsel.l2{background:#475569}
.entryrow td{background:#eef6ff;padding:4px 6px;border-color:#bcd2f0}
.entryrow td:nth-child(1),.entryrow td:nth-child(2){background:#eef6ff}
.delbtn{border:1px solid var(--line);background:#fff;border-radius:5px;cursor:pointer;color:#dc2626;font-size:12px;padding:1px 7px}
.delbtn:hover{border-color:#dc2626;background:#fef2f2}
.newrow td{background:#f0fdf4 !important}
footer{color:#94a3b8;font-family:var(--mono);font-size:11px;text-align:center;margin-top:18px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:flex-start;justify-content:center;z-index:50;overflow:auto;padding:30px 14px}
.overlay.on{display:flex}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:880px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line)}
.mh h2{margin:0;font-size:17px}
.mh .x{border:none;background:none;font-size:20px;cursor:pointer;color:var(--dim)}
.mb{padding:18px 20px}
.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 14px}
.f{display:flex;flex-direction:column;gap:4px}
.f.wide{grid-column:span 2}
.f label{font-size:11.5px;color:var(--dim);font-weight:600}
.f label b{color:#dc2626}
.f input,.f select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:var(--bg)}
.mf{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--line)}
@media(max-width:760px){.fgrid{grid-template-columns:repeat(2,1fr)}}
#printarea{display:none}
#printarea .pttl{font-size:16px;font-weight:800;margin:0 0 8px}
#printarea .pttl span{font-size:11px;color:#555;font-weight:600;margin-left:8px}
#printarea table{border-collapse:collapse;width:100%;font-size:9.5px}
#printarea th,#printarea td{border:1px solid #888;padding:2px 5px;white-space:nowrap}
#printarea th{background:#e8edf5;text-align:center}
#printarea .num{text-align:right}
@media print{.wrap,.overlay{display:none !important}#printarea{display:block !important}}
</style></head><body><div class="wrap">
<div class="tt"><h1>BOM LIST <span style="font-size:13px;color:var(--dim);font-weight:600">종합</span></h1><span class="date">2026. 06. 23</span></div>
<div class="bar">
 <input type="text" id="q" placeholder="품명·품번·재질 검색…" oninput="render()">
 <button class="btn" onclick="expandLv(0)">완제품만(Lv0)</button>
 <button class="btn" onclick="expandLv(9)">전체 펼치기</button>
 <button class="btn pri" onclick="openReg()">＋ 신규 BOM 등록</button>
 <button class="btn" id="savebtn" onclick="saveAll()">💾 저장</button>
 <button class="btn" onclick="exportCSV()">CSV 내보내기</button>
 <button class="btn" onclick="toggleFull()">⛶ 전체화면</button>
 <button class="btn" onclick="openPrint()">🖨 인쇄 설정</button>
 <label class="kpi" style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="onlynew" onchange="render()"> 신규만 보기</label>
 <span class="kpi" id="kpi"></span>
</div>
<div class="scroll"><table id="tbl"></table></div>
<footer>승정 ERP · 기준정보 &gt; 품목/자재 &gt; BOM LIST · 엑셀 원본(278) + 신규 등록 · 저장: 브라우저(추후 Supabase)</footer>
</div>

<div class="overlay" id="overlay">
 <div class="modal">
  <div class="mh"><h2 id="mtitle">신규 BOM 등록</h2><button class="x" onclick="closeModal()">×</button></div>
  <div class="mb"><div class="fgrid" id="fgrid"></div></div>
  <div class="mf"><button class="btn" onclick="closeModal()">취소</button><button class="btn pri" onclick="saveNew()">저장</button></div>
 </div>
</div>

<div class="overlay" id="poverlay">
 <div class="modal" style="max-width:560px">
  <div class="mh"><h2>인쇄 설정</h2><button class="x" onclick="closePrint()">×</button></div>
  <div class="mb"><div class="fgrid" style="grid-template-columns:repeat(2,1fr)">
   <div class="f wide"><label>제목</label><input type="text" id="p_title" value="BOM LIST (종합)"></div>
   <div class="f"><label>용지 방향</label><select id="p_orient"><option value="landscape">가로(권장)</option><option value="portrait">세로</option></select></div>
   <div class="f"><label>인쇄 범위</label><select id="p_scope"><option value="view">현재 화면(필터 적용)</option><option value="all">전체(원본+신규)</option><option value="lv0">완제품(Lv0)만</option></select></div>
   <div class="f wide"><label>컬럼</label><select id="p_cols"><option value="all">전체 컬럼(19)</option><option value="key">핵심 컬럼(품명·품번·재질·소요량·금형·설비·공급처)</option></select></div>
  </div></div>
  <div class="mf"><button class="btn" onclick="closePrint()">취소</button><button class="btn pri" onclick="doPrint()">🖨 인쇄</button></div>
 </div>
</div>
<div class="overlay" id="regoverlay">
 <div class="modal" style="max-width:97vw;width:1560px">
  <div class="mh"><h2>신규 BOM 등록 (표)</h2><button class="x" onclick="closeReg()">×</button></div>
  <div class="mb" style="overflow:auto;max-height:68vh;padding:12px 14px">
   <table id="regtbl"></table>
   <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center"><button class="btn" onclick="addRegRow(1)">＋ 하위 레벨 (Lv+1)</button><button class="btn" onclick="addRegRow(0)">＋ 같은 레벨</button><button class="btn" onclick="addRegRow(-1)">＋ 상위 레벨 (Lv−1)</button> <span class="kpi">Lv은 0(완제품)부터 하위로 <b>계속 깊어질 수 있습니다</b>. 각 행의 Lv 태그를 눌러 단계를 직접 바꿀 수도 있어요.</span></div>
  </div>
  <div class="mf"><button class="btn" onclick="closeReg()">취소</button><button class="btn pri" onclick="saveReg()">전체 저장</button></div>
 </div>
</div>

var LVLAB=["완제품","조립","부품","소부품","세부","세부","세부"];
function inpCells(vn,buf,rfn){
 rfn=rfn||"render";var lv=parseInt(buf.lv||0,10)||0;var h="";
 FIELDS.forEach(function(f){var k=f[0],typ=f[2];
  if(typ==="select"){var mx=Math.max(6,lv+2);var o="";for(var i=0;i<=mx;i++){o+='<option value="'+i+'"'+((String(buf.lv)===String(i))?" selected":"")+'>Lv'+i+' '+(LVLAB[i]||"세부")+'</option>';}h+='<td class="ctr"><select class="ein lvsel l'+(lv<=2?lv:2)+'" title="BOM 레벨 (0=완제품, 하위로 계속 확장)" onchange="'+vn+'.lv=this.value;'+rfn+'()">'+o+'</select></td>';}
  else if(k==="name"){h+='<td><input class="ein" style="padding-left:'+(6+lv*16)+'px" placeholder="'+(lv===0?"●":"▸")+' 품명 *" value="'+escAttr(buf[k])+'" oninput="'+vn+'[\''+k+'\']=this.value"></td>';}
  else{h+='<td><input class="ein" value="'+escAttr(buf[k])+'" oninput="'+vn+'[\''+k+'\']=this.value"></td>';}
 });
 return h;
}
function renderReg(){
 var h="<thead><tr>";HEAD.slice(0,-1).forEach(function(x){h+="<th>"+esc(x)+"</th>";});h+="<th>행</th></tr></thead><tbody>";
 REGROWS.forEach(function(r,idx){h+='<tr class="entryrow">'+inpCells("REGROWS["+idx+"]",r,"renderReg")+'<td class="ctr"><button class="delbtn" onclick="delRegRow('+idx+')" title="행 삭제">✕</button></td></tr>';});
 h+="</tbody>";document.getElementById("regtbl").innerHTML=h;
}
function openReg(){REGROWS=[{lv:0}];renderReg();document.getElementById("regoverlay").classList.add("on");setTimeout(function(){var i=document.querySelector("#regtbl input");if(i)i.focus();},30);}
function closeReg(){document.getElementById("regoverlay").classList.remove("on");}
function addRegRow(rel){var last=REGROWS.length?parseInt(REGROWS[REGROWS.length-1].lv||0,10):0;var nl=Math.max(0,last+(rel||0));REGROWS.push({lv:nl});renderReg();setTimeout(function(){var rows=document.querySelectorAll("#regtbl tbody tr");if(rows.length){var inp=rows[rows.length-1].querySelector("input");if(inp)inp.focus();}},20);}
function delRegRow(i){REGROWS.splice(i,1);if(!REGROWS.length)REGROWS.push({lv:0});renderReg();}
function saveReg(){
 var added=0;REGROWS.forEach(function(rb){if(!rb.name||!String(rb.name).trim())return;var rec={};FIELDS.forEach(function(f){var k=f[0];rec[k]=(k==="lv")?parseInt(rb[k]||0,10):String(rb[k]==null?"":rb[k]).trim();});USER.push(rec);added++;});
 if(!added){alert("품명이 입력된 행이 없습니다.");return;}
 saveU();closeReg();render();alert(added+"개 품목을 등록했습니다.");
}
function entryRowHTML(){return '<tr class="entryrow">'+inpCells("ENTRY",ENTRY,"render")+'<td class="ctr" style="white-space:nowrap"><button class="delbtn ed" onclick="saveEntry()">등록</button> <button class="delbtn" onclick="toggleEntry()">닫기</button></td></tr>';}
function editRowHTML(){return '<tr class="entryrow editing">'+inpCells("EDITBUF",EDITBUF,"render")+'<td class="ctr" style="white-space:nowrap"><button class="delbtn ed" onclick="saveInline()">저장</button> <button class="delbtn" onclick="cancelInline()">취소</button></td></tr>';}
function startEdit(t,id){if(ENTRYMODE){ENTRYMODE=false;ENTRY={};}EDITING={t:t};var src=(t==="seed")?effSeed(id):USER[id];if(t==="seed")EDITING.si=id;else EDITING.ui=id;EDITBUF={};for(var k in src)EDITBUF[k]=src[k];render();setTimeout(function(){var inp=document.querySelector(".editing input");if(inp){inp.focus();inp.select();}},20);}
function cancelInline(){EDITING=null;EDITBUF={};render();}
function saveInline(){
 if(!EDITBUF.name||!String(EDITBUF.name).trim()){alert("Part Name(품명)은 필수입니다.");return;}
 var rec={};FIELDS.forEach(function(f){var k=f[0];rec[k]=(k==="lv")?parseInt(EDITBUF[k]||0,10):String(EDITBUF[k]==null?"":EDITBUF[k]).trim();});
 if(EDITING.t==="seed"){EDITS[EDITING.si]=rec;var ci=COMMIT.indexOf(EDITING.si);if(ci>=0){COMMIT.splice(ci,1);saveC();}saveE();}
 else{USER[EDITING.ui]=rec;saveU();}
 EDITING=null;EDITBUF={};render();
}
function toggleEntry(){ENTRYMODE=!ENTRYMODE;if(!ENTRYMODE)ENTRY={};render();if(ENTRYMODE)setTimeout(function(){var sc=document.querySelector(".scroll");if(sc)sc.scrollTop=0;var inp=document.querySelector(".entryrow input");if(inp)inp.focus();},30);}
function saveEntry(){
 if(!ENTRY.name||!String(ENTRY.name).trim()){alert("Part Name(품명)은 필수입니다.");return;}
 var rec={};FIELDS.forEach(function(f){var k=f[0];rec[k]=(k==="lv")?parseInt(ENTRY[k]||0,10):String(ENTRY[k]==null?"":ENTRY[k]).trim();});
 USER.push(rec);saveU();
 var kl=ENTRY.lv;ENTRY={};if(kl!==undefined&&kl!=="")ENTRY.lv=kl;
 render();
 setTimeout(function(){var inp=document.querySelector(".entryrow:not(.editing) input");if(inp)inp.focus();},20);
}
function showModal(title,v){document.getElementById("mtitle").textContent=title;buildForm(v);document.getElementById("overlay").classList.add("on");}
function openModal(){EDITMODE={t:"new"};showModal("신규 BOM 등록",{});}
function editU(ui){EDITMODE={t:"user",ui:ui};showModal("BOM 편집 (신규 등록분)",USER[ui]);}
function editS(si){EDITMODE={t:"seed",si:si};showModal("BOM 편집 (원본 "+(si+1)+"행)",effSeed(si));}
function revertS(si){if(!confirm("이 행의 수정을 원래(엑셀 원본)대로 되돌릴까요?"))return;delete EDITS[si];var ci=COMMIT.indexOf(si);if(ci>=0)COMMIT.splice(ci,1);saveE();saveC();render();}
function delS(si){if(!confirm("이 원본 행을 삭제(숨김)할까요?\n"+effSeed(si).name+"\n\n원본 데이터는 보존되며 상단 '전체복원'으로 되살릴 수 있습니다."))return;if(DEL.indexOf(si)<0)DEL.push(si);saveD();render();}
function restoreDel(){if(!confirm("삭제한 원본 행 "+DEL.length+"건을 모두 복원할까요?"))return;DEL=[];saveD();render();}
function closeModal(){document.getElementById("overlay").classList.remove("on");}
function buildForm(v){
 var h="";
 FIELDS.forEach(function(f){
  var key=f[0],lab=f[1],typ=f[2],wide=f[3];
  h+='<div class="f'+(wide?" wide":"")+'"><label>'+esc(lab)+(key==="name"?' <b>*</b>':'')+'</label>';
  if(typ==="select"){h+='<select id="fld_'+key+'">';for(var i=0;i<=5;i++){h+='<option value="'+i+'"'+((v.lv==i)?" selected":"")+'>'+i+'</option>';}h+='</select>';}
  else{h+='<input type="text" id="fld_'+key+'" value="'+esc(v[key]==null?"":v[key])+'">';}
  h+='</div>';
 });
 document.getElementById("fgrid").innerHTML=h;
}
function saveNew(){
 var rec={};
 FIELDS.forEach(function(f){var key=f[0];var el=document.getElementById("fld_"+key);rec[key]=(key==="lv")?parseInt(el.value,10):el.value.trim();});
 if(!rec.name){alert("Part Name(품명)은 필수입니다.");return;}
 var m=EDITMODE||{t:"new"};
 if(m.t==="user"){USER[m.ui]=rec;saveU();}
 else if(m.t==="seed"){EDITS[m.si]=rec;var ci=COMMIT.indexOf(m.si);if(ci>=0){COMMIT.splice(ci,1);saveC();}saveE();}
 else{USER.push(rec);saveU();}
 closeModal();render();
}
function saveAll(){
 var pend=Object.keys(EDITS).map(Number).filter(function(i){return COMMIT.indexOf(i)<0;});
 if(!pend.length){alert("저장할 미저장 수정이 없습니다.\n(신규 등록·삭제는 자동 저장됩니다.)");return;}
 pend.forEach(function(i){COMMIT.push(i);});saveC();render();
 alert(pend.length+"건의 수정을 저장(확정)했습니다.\n저장된 행은 '원복'이 사라집니다.");
}
function updateSaveBtn(n){var b=document.getElementById("savebtn");if(!b)return;b.textContent="💾 저장"+(n?" ("+n+")":"");b.classList.toggle("pri",n>0);}
function delU(ui){if(!confirm("삭제할까요?\n"+USER[ui].name))return;USER.splice(ui,1);saveU();render();}
function exportCSV(){
 var lines=[HEAD.slice(0,-1).join(",")];
 var all=allEff();
 all.forEach(function(r){if(r.lv>maxLv)return;lines.push(KEYS.map(function(k){var s=String(r[k]==null?"":r[k]);if(/[",\n]/.test(s))s='"'+s.replace(/"/g,'""')+'"';return s;}).join(","));});
 var b=new Blob(["﻿"+lines.join("\n")],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="승정_BOM_LIST.csv";a.click();
}
function toggleFull(){var el=document.documentElement;if(!document.fullscreenElement){var rq=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;if(rq)rq.call(el);}else{document.exitFullscreen();}}
/* ===== 인쇄 설정 ===== */
var ALLP=[["lv","Lv"],["name","Part Name"],["pno","Part Number"],["spec","Specifications"],["mat","Materials"],["price","단가"],["unit","단위"],["qty","소요량"],["wp","제품중량"],["wr","런너중량"],["wt","총중량"],["ct","C/T"],["cvt","CVT"],["uph","UPH"],["mold","금형번호"],["eqp","설비명"],["sup","공급처"],["remark","Remark"],["eqpcode","설비코드"]];
var KEYP=[["lv","Lv"],["name","Part Name"],["pno","Part Number"],["spec","Specifications"],["mat","Materials"],["qty","소요량"],["mold","금형번호"],["eqp","설비명"],["sup","공급처"]];
var NUMK={price:1,qty:1,wp:1,wr:1,wt:1,ct:1,cvt:1,uph:1};
function openPrint(){document.getElementById("poverlay").classList.add("on");}
function closePrint(){document.getElementById("poverlay").classList.remove("on");}
function getPrintRows(scope){
 if(scope==="lv0")return allEff().filter(function(r){return r.lv===0;});
 if(scope==="view"){
  var q=(document.getElementById("q").value||"").trim().toLowerCase();
  var onlynew=document.getElementById("onlynew").checked;
  var src=onlynew?USER.slice():allEff();
  return src.filter(function(r){if(r.lv>maxLv)return false;if(q){var hay=(r.name+" "+r.pno+" "+r.mat+" "+r.spec).toLowerCase();if(hay.indexOf(q)<0)return false;}return true;});
 }
 return allEff();
}
function doPrint(){
 var title=document.getElementById("p_title").value||"BOM LIST",orient=document.getElementById("p_orient").value;
 var scope=document.getElementById("p_scope").value,cols=(document.getElementById("p_cols").value==="key")?KEYP:ALLP;
 var rows=getPrintRows(scope);
 var h='<div class="pttl">'+esc(title)+'<span>2026. 06. 23 · '+rows.length+'건</span></div>';
 h+='<table><thead><tr>';cols.forEach(function(c){h+='<th>'+esc(c[1])+'</th>';});h+='</tr></thead><tbody>';
 rows.forEach(function(r){h+='<tr>';cols.forEach(function(c){var v=(r[c[0]]==null?"":r[c[0]]);if(c[0]==="name"){var ind="";for(var i=0;i<r.lv;i++)ind+="  ";v=ind+(r.lv===0?"● ":"")+v;}h+='<td'+(NUMK[c[0]]?' class="num"':'')+'>'+esc(v)+'</td>';});h+='</tr>';});
 h+='</tbody></table>';
 document.getElementById("printarea").innerHTML=h;
 document.getElementById("pagestyle").textContent='@page{size:A4 '+orient+';margin:8mm}';
 closePrint();setTimeout(function(){window.print();},180);
}
document.getElementById("poverlay").addEventListener("click",function(e){if(e.target===this)closePrint();});
document.getElementById("regoverlay").addEventListener("click",function(e){if(e.target===this)closeReg();});
document.addEventListener("keydown",function(e){if(e.key==="Escape"&&document.getElementById("overlay").classList.contains("on"))closeModal();});
document.getElementById("overlay").addEventListener("click",function(e){if(e.target===this)closeModal();});
render();
</script></body></html>
